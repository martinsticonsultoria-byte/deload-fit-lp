# Site estático: não há build. O index.html na raiz é o que vai ao ar.
[build]
  publish = "."
  command = ""

# Imagens e fontes têm nome fixo e nunca mudam de conteúdo — cache longo.
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CSS e JS são versionados por ?v=N no HTML, mas o cache aqui é curto
# de propósito: se alguém esquecer de subir o ?v, o navegador se corrige em 1 dia.
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# O HTML sempre revalida, senão uma edição do cliente demora a aparecer.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
