# Quinta dobra — "App do paciente". Mesma lógica do ciclo: o carrossel
# calcula o total sozinho, então adicionar ou remover telas em "cards"
# funciona sem tocar em código. "category" é o rótulo pequeno acima da
# imagem (Treino/Saúde/Evolução) — livre, ao contrário do "Passo 0X" da
# segunda dobra, que é sequencial.
label: "O app do paciente"
title: "Tudo o que o seu paciente precisa,"
title_gradient: "num app só."
lead: "iOS, Android e navegador. Incluso em qualquer plano — seu paciente não paga nada."
lead_accent: "Cada registro que ele faz vira dado no seu painel. E quanto mais ele registra, mais ele enxerga o próprio resultado"
cta: "Começar grátis"
cards:
  - category: "Treino"
    tag: "Abre e treina"
    image: "assets/images/app/app-treino.jpg"
    alt: "Painel de treino no app do paciente com treino A do dia, músculos trabalhados, lista de exercícios e meta de cardio"
    title: "O treino de hoje, já aberto"
    text: "Séries, cargas e músculos trabalhados de cada sessão. Ele marca exercício por exercício — e a tonelagem chega até você sem precisar perguntar."
  - category: "Treino"
    tag: "Progressão medida"
    image: "assets/images/app/app-forca-relativa.jpg"
    alt: "Ferramenta de força relativa com índices de agachamento, supino e levantamento terra em faixas de iniciante a elite"
    title: "Força relativa, não só carga"
    text: "1RM estimado e força por quilo de peso corporal em agachamento, supino e terra. Ele vê a faixa mudar de intermediário para avançado — e é isso que o segura no plano."
  - category: "Saúde"
    tag: "Sem PDF perdido"
    image: "assets/images/app/app-saude.jpg"
    alt: "Painel de saúde do paciente com prescrições ativas de suplementos e lista de exames recentes com faixas de referência"
    title: "Prescrição e exames no bolso"
    text: "Dose, horário e lembrete de cada prescrição. Exames com faixa de referência e sinalização de atenção — nada mais se perde no meio do WhatsApp."
  - category: "Saúde"
    tag: "Registro em 30s"
    image: "assets/images/app/app-sono.jpg"
    alt: "Módulo de sono do app com eficiência de 84,2%, duração, latência, despertares e histórico das últimas noites"
    title: "Sono medido, não estimado"
    text: "Eficiência, latência, despertares e qualidade percebida noite a noite. Quando o resultado trava, você vê se a causa está no sono antes de mexer na dieta."
  - category: "Saúde"
    tag: "Protocolo de 7 dias"
    image: "assets/images/app/app-mrpa.jpg"
    alt: "Módulo MRPA com status do protocolo no dia 3 de 7, médias sistólica e diastólica e evolução das leituras"
    title: "MRPA completo pelo app"
    text: "Sete dias, duas medições de manhã e duas à noite, com as médias sistólica e diastólica calculadas sozinhas. O protocolo que era planilha agora anda no automático."
  - category: "Evolução"
    tag: "O porquê da adesão"
    image: "assets/images/app/app-evolucao.jpg"
    alt: "Painel Minha Evolução com peso, percentual de gordura, massa magra, avaliação antropométrica em gráfico e resumo comparativo"
    title: "Ele vê o próprio resultado"
    text: "Peso, gordura, massa magra, volume de carga e frequência no mesmo painel, com a variação de cada métrica. Paciente que enxerga progresso é paciente que renova."
quote_pre: "Ele registra. Você recebe na hora. E ele vê a própria evolução. "
quote_gradient: "É por isso que ele continua registrando."
