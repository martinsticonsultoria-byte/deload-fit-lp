# Quarta dobra — bento de inteligência clínica. Os 5 cards têm gráficos e
# animações em SVG que continuam fixos no template (curva, radar, órbitas);
# só os textos e os números que aparecem sobre eles são editáveis aqui.
# Os eixos do radar (Dieta/Treino/Sono/Pressão/Exames/Medidas) também ficam
# fixos, porque a posição de cada palavra é calculada para o desenho do
# hexágono — mudar o texto ali sem mudar a posição desalinha o gráfico.
eyebrow_num: "02"
eyebrow_kicker: "Inteligência clínica"
title: "Treino e dieta é o básico. "
title_dim: "Aqui entra a parte clínica."
lead: "Modelo do NIH para projetar perda de peso, exames com faixa de referência e adesão medida todo dia. O que era impressão vira evidência na consulta."
cta: "Começar grátis"

